<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obsidian Notes - Docsify</title>
  <link rel="stylesheet" href="//unpkg.com/docsify/themes/vue.css" />
  <base href="/obsidian-notes/">
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Obsidian Notes',
      repo: 'https://github.com/actioncode-master/obsidian-notes',
      loadSidebar: true,
      homepage: 'docs/README.md',
      subMaxLevel: 2,
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            return content.replace(/\[\[([^\]\|]+)(?:\|([^\]]+))?\]\]/g, function(_, target, alias){
              var text = alias || target;
              var filename = 'docs/' + encodeURI(target.trim()) + '.md';
              return '[' + text.trim() + '](' + filename + ')';
            });
          });
        }
      ]
    };
  </script>

  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
</body>
</html>
